<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="-4 -4 8 8" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Instagram-like gradient -->
    <linearGradient id="igGradient" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f58529"/>
      <stop offset="25%" stop-color="#feda77"/>
      <stop offset="50%" stop-color="#dd2a7b"/>
      <stop offset="75%" stop-color="#8134af"/>
      <stop offset="100%" stop-color="#515bd4"/>
    </linearGradient>

    <!-- Mask: white = visible -->
    <mask id="logoMask">
      <rect x="-4" y="-4" width="8" height="8" fill="black"/>

      <!-- Your shapes in white -->
      <g fill="none" stroke="white" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="
          M -3.1416 0
          C -2.6179 -1.2 -2.0944 -1.5 -1.5708 -1.5
          C -1.0472 -1.5 -0.5236 -1.2 0 0
          C 0.5236 1.2 1.0472 1.5 1.5708 1.5
          C 2.0944 1.5 2.6179 1.2 3.1416 0
        " />

        <circle cx="-1.5708" cy="-3" r="0.7" />
        <circle cx="1.5708" cy="3" r="0.7" />
      </g>
    </mask>
  </defs>

  <!-- One single gradient applied globally -->
  <rect x="-4" y="-4" width="8" height="8"
        fill="url(#igGradient)"
        mask="url(#logoMask)" />

</svg>